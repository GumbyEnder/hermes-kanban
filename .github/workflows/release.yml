name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: plugin

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck
        working-directory: plugin

      - name: Build plugin
        run: npm run build
        working-directory: plugin

      - name: Create release ZIP
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./plugin/package.json').version")
          cd plugin
          zip ../dist/hermes-kanban-bridge-${VERSION}.zip main.js manifest.json styles.css 2>/dev/null || zip ../dist/hermes-kanban-bridge-${VERSION}.zip main.js manifest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
